name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Formatting once (rustfmt is platform-independent).
  fmt:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # Core + CLI on all three target OSes. These build with default features (no
  # cpal/ONNX system libs required), plus a compile-check of the ort-backed
  # `onnx` feature (load-dynamic needs no runtime at build time).
  core-cli:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04-arm, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p sinus-core -p sinus-cli --all-targets -- -D warnings
      - run: cargo test -p sinus-core -p sinus-cli
      - name: 10-minute quiet-room pipeline soak
        run: cargo run --release -p sinus-cli -- soak --secs 600
      - name: onnx feature compile-check
        run: cargo build -p sinus-core --features onnx

  # The Apple UI itself needs Xcode, but its Rust engine, UniFFI contract, and
  # generated Swift/header surface are deterministic and verifiable on Linux.
  apple-contract:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p sinus-app -p sinus-apple --all-targets -- -D warnings
      - run: cargo test -p sinus-app -p sinus-apple
      - run: make apple-bindings-check
      - run: git diff --exit-code -- apps/apple/Generated

  # Compile and link both native Swift destinations against Rust. This is the
  # Mac-side check that cannot run in the Linux development environment.
  apple-native:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make apple-ios-build
      - run: make apple-macos-build

  # cpal live capture + the egui/tray desktop shell need a display/audio stack
  # that the Linux runner lacks, so build them only on macOS and Windows.
  live-and-desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p sinus-core --features live-audio --all-targets -- -D warnings
      - run: cargo clippy -p sinus-desktop --all-targets -- -D warnings
      - run: cargo clippy -p sinus-desktop --features live-audio,onnx,keyring --all-targets -- -D warnings
      - run: cargo test -p sinus-desktop
      - run: cargo build -p sinus-desktop --features live-audio
      - run: cargo build -p sinus-desktop --features live-audio,onnx,keyring
